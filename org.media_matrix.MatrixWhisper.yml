id: org.media_matrix.MatrixWhisper
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: matrixwhisper

finish-args:
  # Netzwerkzugriff für WhatsApp Web
  - --share=network
  # Grafik- und Fenstersysteme (Wayland + X11 Fallback)
  - --socket=wayland
  - --socket=x11
  - --device=dri
  # Audiozugriff für Töne und Sprachnachrichten (PipeWire / PulseAudio)
  - --socket=pulseaudio
  # Benachrichtigungen ans System senden (Tray-Notifications)
  - --talk-name=org.freedesktop.Notifications
  # Status-Icon im Systemabschnitt (Tray) erlauben
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: python3-pyqt6
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      # Installiert PyQt6 und QtWebEngine isoliert in die Sandbox
      - pip3 install --verbose --prefix=/app pyqt6 PyQt6-WebEngine

  - name: matrixwhisper
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/sonictriplex/MatrixWhisper.git
        commit: 09815a9174a059687d04fba822e92c4329caba57
    build-commands:
      # 1. Hauptverzeichnis für die App-Dateien erstellen und kopieren
      - mkdir -p /app/share/matrixwhisper
      - cp -r . /app/share/matrixwhisper/

      # 2. Startbefehl im Flatpak-Bin-Pfad anlegen
      - mkdir -p /app/bin
      - echo '#!/bin/sh' > /app/bin/matrixwhisper
      - echo 'exec python3 /app/share/matrixwhisper/matrixwhisper.py "$@"' >> /app/bin/matrixwhisper
      - chmod +x /app/bin/matrixwhisper

      # 3. Desktop-Starter für das App-Menü installieren
      - mkdir -p /app/share/applications
      - cp org.media_matrix.MatrixWhisper.desktop /app/share/applications/

      # 4. AppStream-Metadaten für den Software-Store installieren
      - mkdir -p /app/share/metainfo
      - cp org.media_matrix.MatrixWhisper.metainfo.xml /app/share/metainfo/

      # 5. Logo als offizielles System-Icon hinterlegen (Jetzt mit echten 512x512 Pixeln)
      - mkdir -p /app/share/icons/hicolor/512x512/apps
      - cp media/media-matrix-logo-512.png /app/share/icons/hicolor/512x512/apps/org.media_matrix.MatrixWhisper.png
